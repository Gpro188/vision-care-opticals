<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Data Loading - Vision Care</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .success { background: #d4edda; padding: 15px; border-radius: 5px; margin: 10px 0; }
        .error { background: #f8d7da; padding: 15px; border-radius: 5px; margin: 10px 0; }
        .info { background: #d1ecf1; padding: 15px; border-radius: 5px; margin: 10px 0; }
        pre { background: #f4f4f4; padding: 10px; overflow: auto; max-height: 300px; }
        button { padding: 10px 20px; background: #007bff; color: white; border: none; cursor: pointer; margin: 5px; }
        button:hover { background: #0056b3; }
    </style>
</head>
<body>
    <h1>🔍 Vision Care - Data Loading Test</h1>
    
    <button onclick="loadData()">Load data.json</button>
    <button onclick="clearCache()">Clear Cache & Reload</button>
    
    <div id="result"></div>
    
    <script>
        async function loadData() {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = '<div class="info">Loading data.json... Please wait.</div>';
            
            try {
                // Add cache buster
                const url = 'data.json?t=' + new Date().getTime();
                console.log('Fetching:', url);
                
                const response = await fetch(url, {
                    method: 'GET',
                    cache: 'no-cache'
                });
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const data = await response.json();
                
                let html = '<div class="success"><strong>✅ SUCCESS!</strong> Data loaded from data.json</div>';
                html += '<h3>Data Summary:</h3><ul>';
                
                // Count items in each section
                if (data.hero) html += `<li>Hero Section: ${Object.keys(data.hero).length} items</li>`;
                if (data.sliderBanners) html += `<li>Slider Banners: ${data.sliderBanners.length || 0} items</li>`;
                if (data.brands) html += `<li>Brands: ${data.brands.length || 0} items</li>`;
                if (data.frames) html += `<li>Frames: ${data.frames.length || 0} items</li>`;
                if (data.services) html += `<li>Services: ${data.services.length || 0} items</li>`;
                if (data.about) html += `<li>About: ${Object.keys(data.about).length} items</li>`;
                if (data.contact) html += `<li>Contact: ${Object.keys(data.contact).length} items</li>`;
                
                html += '</ul>';
                html += '<h3>Raw Data (first 500 chars):</h3>';
                html += '<pre>' + JSON.stringify(data, null, 2).substring(0, 500) + '...</pre>';
                
                resultDiv.innerHTML = html;
                
                console.log('✅ Data loaded successfully:', data);
                
            } catch (error) {
                resultDiv.innerHTML = `
                    <div class="error">
                        <strong>❌ ERROR!</strong> Failed to load data.json<br><br>
                        Error: ${error.message}<br><br>
                        <strong>Troubleshooting:</strong><br>
                        1. Check if data.json exists in GitHub repository<br>
                        2. Make sure it's at the root level<br>
                        3. Check browser console (F12) for more details<br>
                        4. Try clearing cache and reloading
                    </div>
                `;
                console.error('❌ Error loading data:', error);
            }
        }
        
        function clearCache() {
            if (confirm('This will clear your browser cache and reload the page. Continue?')) {
                window.location.reload(true);
            }
        }
        
        // Auto-load on page load
        window.addEventListener('DOMContentLoaded', loadData);
    </script>
</body>
</html>
