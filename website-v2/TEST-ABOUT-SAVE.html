<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test About Save</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
        }
        .test-section {
            background: #f5f5f5;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        button {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            margin: 5px;
        }
        button:hover {
            background: #45a049;
        }
        .result {
            background: #e3f2fd;
            padding: 15px;
            border-radius: 5px;
            margin-top: 15px;
            font-family: monospace;
            white-space: pre-wrap;
        }
        input, textarea {
            width: 100%;
            padding: 10px;
            margin: 5px 0;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <h1>🧪 About Section Save Test</h1>
    
    <div class="test-section">
        <h2>Step 1: Fill in About Data</h2>
        <label>Title:</label>
        <input type="text" id="aboutTitle" placeholder="About Vision Care" value="About Vision Care">
        
        <label>Main Text:</label>
        <textarea id="aboutText1" rows="4" placeholder="Write about your company...">We are dedicated to providing the best eye care services.</textarea>
        
        <label>Additional Text:</label>
        <textarea id="aboutText2" rows="4" placeholder="More information...">Our team of experienced optometrists is here to help.</textarea>
        
        <button onclick="testSave()">💾 Save About Section</button>
        <button onclick="testLoad()" style="background: #2196F3;">📥 Load Data</button>
        <button onclick="clearData()" style="background: #f44336;">🗑️ Clear Data</button>
    </div>
    
    <div class="test-section">
        <h2>Step 2: Check Results</h2>
        <div id="result" class="result">Click "Load Data" to see what's saved...</div>
    </div>
    
    <div class="test-section">
        <h2>Step 3: Open Browser Console</h2>
        <p>Press <strong>F12</strong> to open Developer Tools and check the Console tab for detailed logs.</p>
    </div>

    <script>
        const DATA_SERVER_URL = 'http://localhost:3456/api/data';
        
        async function testSave() {
            console.log('🧪 Starting save test...');
            
            // Get values from form
            const title = document.getElementById('aboutTitle').value;
            const text1 = document.getElementById('aboutText1').value;
            const text2 = document.getElementById('aboutText2').value;
            
            console.log('📝 Form values:', { title, text1, text2 });
            
            // Try to load existing data first
            let adminData = {};
            try {
                const response = await fetch(DATA_SERVER_URL);
                if (response.ok) {
                    adminData = await response.json();
                    console.log('✅ Loaded existing data');
                }
            } catch (error) {
                console.log('⚠️ Could not load existing data, starting fresh');
            }
            
            // Set about data
            adminData.about = { title, text1, text2 };
            
            console.log('💾 Data to save:', adminData.about);
            
            // Save to server
            try {
                const response = await fetch(DATA_SERVER_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(adminData)
                });
                
                if (response.ok) {
                    const result = await response.json();
                    console.log('✅ Save successful:', result);
                    
                    // Verify by reading back
                    const verifyResponse = await fetch(DATA_SERVER_URL);
                    const savedData = await verifyResponse.json();
                    console.log('✅ Verification - Saved data:', savedData.about);
                    
                    document.getElementById('result').textContent = '✅ SAVE SUCCESSFUL!\n\nSaved About Data:\n' + JSON.stringify(savedData.about, null, 2);
                    
                    alert('✅ About section saved successfully!\n\nCheck console for details.');
                } else {
                    throw new Error('Server responded with error');
                }
            } catch (error) {
                console.error('❌ Save failed:', error);
                document.getElementById('result').textContent = '❌ SAVE FAILED!\n\nError: ' + error.message + '\n\nMake sure the data server is running (START-SERVER.bat)';
                alert('❌ Failed to save! Make sure START-SERVER.bat is running.\n\nError: ' + error.message);
            }
        }
        
        async function testLoad() {
            console.log('📥 Loading data...');
            
            try {
                const response = await fetch(DATA_SERVER_URL);
                if (response.ok) {
                    const data = await response.json();
                    console.log('✅ Loaded data:', data);
                    
                    let resultText = '📊 Current Saved Data:\n\n';
                    resultText += 'About Section:\n';
                    resultText += JSON.stringify(data.about || {}, null, 2);
                    resultText += '\n\nAll Data Keys: ' + Object.keys(data).join(', ');
                    
                    document.getElementById('result').textContent = resultText;
                    
                    // Populate form
                    if (data.about) {
                        document.getElementById('aboutTitle').value = data.about.title || '';
                        document.getElementById('aboutText1').value = data.about.text1 || '';
                        document.getElementById('aboutText2').value = data.about.text2 || '';
                    }
                } else {
                    throw new Error('Failed to load data');
                }
            } catch (error) {
                console.error('❌ Load failed:', error);
                document.getElementById('result').textContent = '❌ LOAD FAILED!\n\nError: ' + error.message;
                alert('❌ Failed to load data!\n\nError: ' + error.message);
            }
        }
        
        function clearData() {
            if (confirm('Are you sure you want to clear all data?')) {
                fetch(DATA_SERVER_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({})
                }).then(() => {
                    alert('✅ All data cleared!');
                    testLoad();
                });
            }
        }
        
        // Auto-load on page start
        window.addEventListener('load', testLoad);
    </script>
</body>
</html>
