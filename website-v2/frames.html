<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Frames - Vision Care</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="container">
            <div class="logo">
                <img src="logo-with-name.png" alt="Vision Care Logo" class="logo-image" id="headerLogo" style="max-height: 60px; width: auto; display: block;">
            </div>
            <nav class="nav">
                <a href="index.html">Home</a>
                <a href="#frames">Frames</a>
                <a href="index.html#services">Services</a>
                <a href="index.html#about">About</a>
                <a href="index.html#contact">Contact</a>
            </nav>
        </div>
    </header>

    <!-- Page Title -->
    <section class="page-title">
        <div class="container">
            <h1>👓 Complete Frames Collection</h1>
            <p>Discover our full range of premium eyewear</p>
        </div>
    </section>

    <!-- Frames Showcase -->
    <section id="frames" class="frames-section">
        <div class="container">
            <!-- Filter Buttons -->
            <div class="filter-buttons">
                <button class="filter-btn active" onclick="filterFrames('all')">All Frames</button>
                <button class="filter-btn" onclick="filterFrames('latest')">Latest Arrivals</button>
                <button class="filter-btn" onclick="filterFrames('trending')">Trending</button>
            </div>
            
            <div class="frames-grid" id="framesGrid">
                <!-- All frames will be loaded here -->
            </div>
        </div>
    </section>

    <!-- Back to Home -->
    <section class="back-home-section">
        <div class="container" style="text-align: center; padding: 60px 20px;">
            <h2 style="color: #453982; margin-bottom: 20px;">Need Help Choosing?</h2>
            <p style="font-size: 1.1rem; color: #666; margin-bottom: 30px;">Visit our store for a personalized fitting experience</p>
            <a href="index.html" class="btn btn-secondary">← Back to Home</a>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-logo">
                    <img src="logo-only.png" alt="Vision Care Logo" class="footer-logo-image" id="footerLogo">
                </div>
                <div class="footer-social" id="footerSocial">
                    <!-- Social media links will be loaded here -->
                </div>
                <p>&copy; 2026 Vision Care. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <!-- Cart Floating Button -->
    <div class="cart-floating" onclick="toggleCart()">
        <span class="cart-icon">🛒</span>
        <span class="cart-count" id="cartCount">0</span>
    </div>

    <!-- Cart Modal -->
    <div id="cartModal" class="cart-modal">
        <div class="cart-content">
            <div class="cart-header">
                <h2>Shopping Cart</h2>
                <button class="cart-close" onclick="toggleCart()">×</button>
            </div>
            <div class="cart-items" id="cartItems">
                <!-- Cart items will be loaded here -->
            </div>
            <div class="cart-footer">
                <div class="cart-total">
                    <span>Total:</span>
                    <span id="cartTotal">₹0.00</span>
                </div>
                <button class="btn-checkout" onclick="checkoutWhatsApp()">Checkout via WhatsApp</button>
            </div>
        </div>
    </div>

    <script src="data-loader.js"></script>
</body>
</html>
